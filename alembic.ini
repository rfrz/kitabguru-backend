# Bagian utama konfigurasi Alembic untuk migrasi database
[alembic]
# Menentukan nama folder tempat script migrasi disimpan
script_location = alembic
# Menambahkan path saat ini ke sys.path agar modul lokal dapat diimpor
prepend_sys_path = .
# Mengatur separator path versi migrasi menggunakan modul os (independen platform)
version_path_separator = os
# Menentukan URL koneksi ke database PostgreSQL menggunakan adapter asyncpg
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/kitabguru

# Bagian hooks yang dijalankan setelah file migrasi dibuat (kosong secara default)
[post_write_hooks]

# Bagian konfigurasi logger yang ada di sistem
[loggers]
# Mendefinisikan nama-nama logger yang akan digunakan
keys = root,sqlalchemy,alembic

# Bagian konfigurasi handler output log
[handlers]
# Mendefinisikan console sebagai handler log utama (output terminal)
keys = console

# Bagian konfigurasi format penulisan log
[formatters]
# Mendefinisikan generic sebagai formatter utama log
keys = generic

# Konfigurasi level dan handler untuk logger root
[logger_root]
# Mengatur level log root minimal ke WARNING agar log yang kurang penting tidak tampil
level = WARN
# Mengarahkan output log root ke handler console
handlers = console
# Nama logger root kosong karena merupakan logger dasar
qualname =

# Konfigurasi level dan handler untuk logger SQLAlchemy (query database)
[logger_sqlalchemy]
# Mengatur level log SQLAlchemy ke WARNING agar query SQL tidak membajak console
level = WARN
# Handler kosong agar meneruskan output ke logger root
handlers =
# Menargetkan logger engine internal milik SQLAlchemy
qualname = sqlalchemy.engine

# Konfigurasi level dan handler untuk logger Alembic (aktivitas migrasi)
[logger_alembic]
# Mengatur level log Alembic ke INFO agar status migrasi terlihat jelas
level = INFO
# Handler kosong agar meneruskan output ke logger root
handlers =
# Menargetkan logger internal milik Alembic
qualname = alembic

# Detail konfigurasi console handler
[handler_console]
# Menggunakan StreamHandler bawaan Python untuk mencetak log ke console
class = StreamHandler
# Mengarahkan stream output ke standard error (sys.stderr)
args = (sys.stderr,)
# Level minimal log diset ke NOTSET agar semua log yang masuk diproses
level = NOTSET
# Menggunakan format log generic yang sudah didefinisikan sebelumnya
formatter = generic

# Detail format pesan log yang digunakan generic formatter
[formatter_generic]
# Menentukan format teks log: level (lebar 5), nama logger, dan isi pesan log
format = %(levelname)-5.5s [%(name)s] %(message)s
# Menentukan format penulisan jam log (Jam:Menit:Detik)
datefmt = %H:%M:%S
